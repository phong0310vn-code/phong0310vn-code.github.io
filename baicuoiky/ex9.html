<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trưng bày sản phẩm</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f9f9f9; padding: 20px; }

        /* Bước 4: Định dạng lưới sản phẩm và hiệu ứng Hover */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #eee;
            /* Đổ bóng mặc định */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease; /* Tạo hiệu ứng mượt mà */
        }

        /* Hiệu ứng khi di chuột vào thẻ */
        .product-card:hover {
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transform: translateY(-5px);
        }

        .price {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.2em;
            display: block; /* Đảm bảo giá nằm trên dòng riêng */
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover { background-color: #2c3e50; }
    </style>
</head>
<body>

    <h1>Bộ sưu tập Công nghệ &reg;</h1>

    <!-- Bước 1 & 3: Lưới 4 sản phẩm với Thực thể HTML -->
    <div class="product-grid">
        <div class="product-card">
            <h3>Laptop Pro &reg;</h3>
            <p class="price">1.200 &euro;</p>
            <p>Hiệu năng đỉnh cao cho công việc &rarr;</p>
        </div>
        <div class="product-card">
            <h3>Smartphone X</h3>
            <p class="price">800 &euro;</p>
            <p>Màn hình OLED sắc nét &rarr;</p>
        </div>
        <div class="product-card">
            <h3>Tai nghe ANC</h3>
            <p class="price">250 &euro;</p>
            <p>Chống ồn chủ động vượt trội &rarr;</p>
        </div>
        <div class="product-card">
            <h3>Smartwatch S4</h3>
            <p class="price">350 &euro;</p>
            <p>Theo dõi sức khỏe 24/7 &rarr;</p>
        </div>
    </div>

    <!-- Bước 5: Nút Toggle Price -->
    <button onclick="togglePrice()">Toggle Price</button>

    <script>
        // Bước 5: Hàm ẩn/hiện giá tiền
        function togglePrice() {
            // Lấy danh sách tất cả các phần tử có class là 'price'
            const prices = document.getElementsByClassName('price');

            // Duyệt qua từng phần tử trong danh sách
            for (let i = 0; i < prices.length; i++) {
                // Kiểm tra trạng thái hiện tại để đảo ngược (Toggle)
                if (prices[i].style.display === 'none') {
                    prices[i].style.display = 'block';
                } else {
                    prices[i].style.display = 'none';
                }
            }
        }
    </script>

</body>
</html>
